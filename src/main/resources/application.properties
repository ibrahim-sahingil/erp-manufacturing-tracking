spring.application.name=erp

# Gizli degerler proje kokundeki secrets.properties dosyasindan gelir
# (git'e girmez - .gitignore'da). Yeni kurulumda olusturulmasi gereken anahtarlar:
#   DB_PASSWORD=...
#   APP_JWT_SECRET=... (en az 32 karakter)
spring.config.import=optional:file:./secrets.properties

# ===========================================
# Sunucu Port Ayari
# ===========================================
server.port=8080

# Reverse proxy (Cloudflare Tunnel vb.) arkasinda calisirken
# X-Forwarded-Proto/Host basliklarini dikkate al - boylece ayni-origin
# istekler dogru tespit edilir (aksi halde CORS 403 verir).
server.forwarded-headers-strategy=framework

# (E3) QR fis linkleri icin KALICI temel adres. Bos birakilirsa frontend
# location.origin'e duser (tunel adresi degisince basili QR'lar olur). Kalici
# QR icin buraya adlandirilmis/sabit Cloudflare tunel adresini yaz, or:
#   app.base-url=https://erp.sirketiniz.com/
app.base-url=

# ===========================================
# PostgreSQL Veritabani Baglanti Ayarlari
# ===========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/uretim_takip
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# ===========================================
# JPA / Hibernate Ayarlari (Kurumsal Mimari)
# ===========================================
# Tablolari DBeaver'da biz kurdugumuz icin Hibernate'in
# tablo yapisiyla oynamasini KESINLIKLE yasakliyoruz.
spring.jpa.hibernate.ddl-auto=none

# Arka planda calisan SQL kodlarini konsolda gormek icin
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Lazy loading sorunlarini onlemek icin (open-in-view kapali olmali - profesyonel mimari)
spring.jpa.open-in-view=false

# ===========================================
# Jackson (JSON Serialization) Ayarlari
# ===========================================
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Europe/Istanbul
spring.jackson.default-property-inclusion=non_null
# Frontend snake_case bekliyor (Supabase mirasi): fullName -> full_name
spring.jackson.property-naming-strategy=SNAKE_CASE

# ===========================================
# JWT Ayarlari (Authentication)
# ===========================================
# DIKKAT: Bu secret en az 32 karakter olmali (256 bit guvenlik).
# Deger secrets.properties'ten gelir - koda yazma!
app.jwt.secret=${APP_JWT_SECRET:}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# ===========================================
# CORS Ayarlari (Frontend baska bir port'tan gelebilir)
# ===========================================
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://127.0.0.1:5500,http://localhost:5500,http://127.0.0.1:8080,http://localhost:8080

# ===========================================
# Multipart (Dosya Yukleme - teknik resimler DWG/PDF buyuk olabiliyor)
# ===========================================
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ===========================================
# Logging Ayarlari
# ===========================================
logging.level.root=INFO
logging.level.com.uretimtakip.erp=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG

# ===========================================
# Error Handling
# ===========================================
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never
server.error.include-exception=false
