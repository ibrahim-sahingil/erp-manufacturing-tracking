spring.application.name=erp

# ===========================================
# Sunucu Port Ayari
# ===========================================
server.port=8080

# ===========================================
# PostgreSQL Veritabani Baglanti Ayarlari
# ===========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/uretim_takip
spring.datasource.username=postgres
spring.datasource.password=2110951
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# ===========================================
# JPA / Hibernate Ayarlari (Kurumsal Mimari)
# ===========================================
# Tablolari DBeaver'da biz kurdugumuz icin Hibernate'in
# tablo yapisiyla oynamasini KESINLIKLE yasakliyoruz.
spring.jpa.hibernate.ddl-auto=none

# Arka planda calisan SQL kodlarini konsolda gormek icin
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Lazy loading sorunlarini onlemek icin (open-in-view kapali olmali - profesyonel mimari)
spring.jpa.open-in-view=false

# ===========================================
# Jackson (JSON Serialization) Ayarlari
# ===========================================
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Europe/Istanbul
spring.jackson.default-property-inclusion=non_null
# Frontend snake_case bekliyor (Supabase mirasi): fullName -> full_name
spring.jackson.property-naming-strategy=SNAKE_CASE

# ===========================================
# JWT Ayarlari (Authentication)
# ===========================================
# DIKKAT: Bu secret en az 32 karakter olmali (256 bit guvenlik).
# Production'da environment variable'dan al, koda yazma!
app.jwt.secret=BU_GIZLI_KEYI_MUTLAKA_DEGISTIR_EN_AZ_32_KARAKTER_OLMALI_GUVENLI_BIR_SECRET_KEY_2026
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# ===========================================
# CORS Ayarlari (Frontend baska bir port'tan gelebilir)
# ===========================================
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://127.0.0.1:5500,http://localhost:5500,http://127.0.0.1:8080,http://localhost:8080

# ===========================================
# Multipart (Dosya Yukleme - QR vs ileride)
# ===========================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===========================================
# Logging Ayarlari
# ===========================================
logging.level.root=INFO
logging.level.com.uretimtakip.erp=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG

# ===========================================
# Error Handling
# ===========================================
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never
server.error.include-exception=false
